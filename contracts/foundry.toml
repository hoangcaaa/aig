[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "scripts"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# BSC Testnet fork for local testing
[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC_URL}"
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
bsc_testnet = { key = "${BSCSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
